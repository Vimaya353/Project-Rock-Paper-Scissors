<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rock Paper Scissors</title>
</head>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 40px 20px;
      background-color: #f4f4f4;
    }

    h1 {
      margin-bottom: 20px;
    }

    .buttons {
      margin-bottom: 30px;
    }

    button {
      padding: 12px 24px;
      margin: 0 10px 10px;
      font-size: 16px;
      cursor: pointer;
    }

    #results {
      max-width: 500px;
      margin: 0 auto;
      padding: 20px;
      background: white;
      border: 1px solid #ddd;
      border-radius: 8px;
    }

    #score {
      font-size: 20px;
      margin-bottom: 15px;
      font-weight: bold;
    }

    #round-result,
    #final-result {
      margin: 10px 0;
    }
  </style>
</head>
<body>
  <h1>Rock Paper Scissors</h1>

  <div class="buttons">
    <button id="rock">Rock</button>
    <button id="paper">Paper</button>
    <button id="scissors">Scissors</button>
  </div>

  <div id="results">
    <div id="score">Player: 0 | Computer: 0</div>
    <div id="round-result">Choose an option to start the game.</div>
    <div id="final-result"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
